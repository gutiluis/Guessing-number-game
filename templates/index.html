<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Guessing Game</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial; margin: 50px; }
        input, button { padding: 8px; font-size: 16px; margin: 5px; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<h1>Number Guessing Game (1–10)</h1>

<div id="playerSection">
    <input type="text" id="playerName" placeholder="Enter your name">
    <button id="startGame">Start Game</button>
</div>

<div id="gameSection" style="display:none;">
    <input type="number" id="guess" min="1" max="10">
    <button id="submitGuess">Guess</button>
    <div id="result"></div>
</div>

<script>
$(document).ready(function(){
    $("#startGame").click(function(){
        const player_name = $("#playerName").val().trim();
        if(!player_name) { alert("Enter your name!"); return; }

        $.ajax({
            url: "/start",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ player_name: player_name }),
            success: function(response){
                $("#result").text(response.message);
                $("#playerSection").hide();
                $("#gameSection").show();
            }
        });
    });

    $("#submitGuess").click(function(){
        const guess = $("#guess").val();
        if(!guess) { alert("Enter a number!"); return; }

        $.ajax({
            url: "/guess",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ guess: guess }),
            success: function(response){
                $("#result").text(response.result);
            }
        });
    });
});
</script>

</body>
</html>
